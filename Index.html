<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
body { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
#wrap {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-transition:-webkit-transform 0.8s ease;
  transition:transform 0.8s ease;
  -webkit-transform-origin:center center;
  transform-origin:center center;
}
#time { font-family:Courier,monospace; font-size:22vw; color:#888; line-height:1; white-space:nowrap; }
#colon { -webkit-animation:blink 1s step-end infinite; animation:blink 1s step-end infinite; }
@-webkit-keyframes blink { 50% { opacity:0.1; } }
@keyframes blink         { 50% { opacity:0.1; } }
#date { font-family:Courier,monospace; font-size:3.5vw; color:#444; margin-top:8px; letter-spacing:2px; white-space:nowrap; }
#line { width:80px; height:1px; background:#222; margin:14px 0; }
#wrow { font-family:Courier,monospace; font-size:3.2vw; color:#444; white-space:nowrap; }
</style>
</head>
<body>
<div id="wrap">
  <div id="time"><span id="hh">00</span><span id="colon">:</span><span id="mm">00</span></div>
  <div id="date"></div>
  <div id="line"></div>
  <div id="wrow">날씨 로딩중</div>
</div>
<script>
var DAYS = ['일','월','화','수','목','금','토'];
var angle = 0;
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function tick() {
  var t = new Date();
  document.getElementById('hh').textContent = pad(t.getHours());
  document.getElementById('mm').textContent = pad(t.getMinutes());
  document.getElementById('date').textContent =
    t.getFullYear() + '년 ' + (t.getMonth() + 1) + '월 ' +
    t.getDate() + '일 (' + DAYS[t.getDay()] + ')';
}
function rotate() {
  angle = (angle + 90) % 360;
  var wrap = document.getElementById('wrap');
  var w = (angle == 90 || angle == 270) ? window.innerHeight : window.innerWidth;
  var h = (angle == 90 || angle == 270) ? window.innerWidth  : window.innerHeight;
  wrap.style.width  = w + 'px';
  wrap.style.height = h + 'px';
  wrap.style.webkitTransform = 'rotate(' + angle + 'deg)';
  wrap.style.transform       = 'rotate(' + angle + 'deg)';
}
function initWrap() {
  var wrap = document.getElementById('wrap');
  wrap.style.width  = window.innerWidth  + 'px';
  wrap.style.height = window.innerHeight + 'px';
}
function wmoIcon(c, day) {
  if (c == 0)  return day ? '☀️ 맑음'      : '🌙 맑음';
  if (c == 1)  return day ? '🌤 대체로맑음' : '🌙 대체로맑음';
  if (c == 2)  return '⛅ 부분흐림';
  if (c == 3)  return '☁️ 흐림';
  if (c <= 48) return '🌫 안개';
  if (c <= 55) return '🌦 이슬비';
  if (c <= 65) return '🌧 비';
  if (c <= 77) return '❄️ 눈';
  if (c <= 82) return '⛈ 소나기';
  return '⛈ 뇌우';
}
function fetchWeather() {
  var x = new XMLHttpRequest();
  x.open('GET',
    'https://api.open-meteo.com/v1/forecast' +
    '?latitude=37.4789&longitude=126.8664' +
    '&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,is_day' +
    '&timezone=Asia%2FSeoul&forecast_days=1', true);
  x.timeout = 12000;
  x.onreadystatechange = function() {
    if (x.readyState != 4) return;
    if (x.status == 200) {
      try {
        var d = JSON.parse(x.responseText).current;
        var icon = wmoIcon(d.weather_code, d.is_day == 1);
        document.getElementById('wrow').textContent =
          icon + '  ' + Math.round(d.temperature_2m) + 'C' +
          '  체감' + Math.round(d.apparent_temperature) + 'C' +
          '  습도' + Math.round(d.relative_humidity_2m) + '%';
      } catch(e) { document.getElementById('wrow').textContent = '파싱오류'; }
    } else { document.getElementById('wrow').textContent = '오류 ' + x.status; }
  };
  x.ontimeout = function() { document.getElementById('wrow').textContent = '시간초과'; };
  x.onerror   = function() { document.getElementById('wrow').textContent = '네트워크오류'; };
  x.send();
}
initWrap();
tick();
setInterval(tick, 1000);
setInterval(rotate, 15000);
fetchWeather();
setInterval(fetchWeather, 600000);
</script>
</body>
</html>
