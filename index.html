S, V, O 세 개가 동시에 1초마다 한꺼번에 새 단어로 교체되는 거네요. 전체 코드예요:

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
body {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-flex-direction:column; flex-direction:column;
}
#header {
  width:100%;
  text-align:center;
  font-family:Courier,monospace;
  font-size:3vw;
  letter-spacing:2px;
  padding:10px 0 6px;
  min-height:5vw;
  white-space:nowrap;
}
#hs { color:#a29bfe; }
#hv { color:#0be881; }
#ho { color:#ff9f43; }
#wrap {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-transform-origin:center center;
  transform-origin:center center;
}
#time {
  font-family:Courier,monospace;
  font-size:22vw;
  line-height:1;
  white-space:nowrap;
}
#colon { opacity:1; font-size:0.5em; vertical-align:middle; }
#date {
  font-family:Courier,monospace;
  font-size:3.5vw;
  margin-top:8px;
  letter-spacing:2px;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="header">
  <span id="hs"></span><span id="hv"></span><span id="ho"></span>
</div>
<div id="wrap">
  <div id="time"><span id="hh">00</span><span id="colon">:</span><span id="mm">00</span></div>
  <div id="date"></div>
</div>
<script>
var DAYS = ['일','월','화','수','목','금','토'];
var COLORS = [
  '#ffffff','#aaaaaa','#ff6b6b','#ff9f43',
  '#ffd32a','#0be881','#67e5ad','#48dbfb',
  '#54a0ff','#a29bfe','#fd79a8','#fab1d3'
];
var SYMS = [
  '!','@','#','$','%','^','&','*','?','~',
  '+','-','=','|','/','\\','<','>','[',']',
  '{','}','(',')','_','§','¶','†','‡','•',
  '★','☆','♠','♣','♥','♦','©','®','™','✓',
  '∞','≈','≠','±','×','÷','∑','√','∂','∆',
  'Ω','μ','π','Φ','Ψ','λ','ξ','η','θ','ε'
];
var S_LIST = [
  'My dog','My cat','My boss','My friend','The teacher',
  'My mother','The doctor','My sister','The baby','My neighbor',
  'The chef','My brother','The student','My father','The kid',
  'My enemy','My government','My AI','My client','My rival',
  'The thief','The president'
];
var V_LIST = [
  'loves','hates','needs','wants','finds',
  'makes','takes','breaks','holds','carries',
  'builds','uses','leaves','brings','keeps',
  'kills','strikes','eats','dumps','hugs'
];
var O_LIST = [
  'a book','a phone','a key','a bag','a chair',
  'a cup','a knife','a ball','a box','a bike',
  'a door','a pen','a coat','a hat','a lamp',
  'a map','a note','a plate','a ring','a shoe',
  'a spoon','a ticket','a towel','a watch','a bottle',
  'a card','a fork','a glass','an umbrella','an apple',
  'freedom','welfare','rights','victory','hatred',
  'growth','ideology'
];

var lastColorIdx = -1;
var lastColonColorIdx = -1;
var lastSymIdx = -1;
var lastMinute = -1;

function rand(arr) { return Math.floor(Math.random() * arr.length); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function refreshHeader() {
  document.getElementById('hs').textContent = S_LIST[rand(S_LIST)] + ' ';
  document.getElementById('hv').textContent = V_LIST[rand(V_LIST)] + ' ';
  document.getElementById('ho').textContent = O_LIST[rand(O_LIST)];
}

function pickColor() {
  var idx;
  do { idx = rand(COLORS); } while (idx === lastColorIdx);
  lastColorIdx = idx;
  return COLORS[idx];
}
function applyColor(c) {
  document.getElementById('time').style.color = c;
  document.getElementById('date').style.color = c;
}
function pickColonColor() {
  var idx;
  do { idx = rand(COLORS); } while (idx === lastColonColorIdx || idx === lastColorIdx);
  lastColonColorIdx = idx;
  return COLORS[idx];
}
function tickSym() {
  var idx;
  do { idx = rand(SYMS); } while (idx === lastSymIdx);
  lastSymIdx = idx;
  var colon = document.getElementById('colon');
  colon.textContent = SYMS[idx];
  colon.style.color = pickColonColor();
}

function tick() {
  var t = new Date();
  var m = t.getMinutes();
  document.getElementById('hh').textContent = pad(t.getHours());
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('date').textContent =
    t.getFullYear() + '년 ' + (t.getMonth() + 1) + '월 ' +
    t.getDate() + '일 (' + DAYS[t.getDay()] + ')';
  if (m !== lastMinute) {
    lastMinute = m;
    applyColor(pickColor());
  }
  tickSym();
  refreshHeader();
}

function initWrap() {
  var wrap = document.getElementById('wrap');
  wrap.style.width  = window.innerWidth  + 'px';
  wrap.style.height = (window.innerHeight - document.getElementById('header').offsetHeight) + 'px';
}

function frame() {
  var t = new Date();
  var sec = t.getSeconds() + t.getMilliseconds() / 1000;
  var wrap = document.getElementById('wrap');
  wrap.style.webkitTransform = 'rotate(' + (sec * 6) + 'deg)';
  wrap.style.transform       = 'rotate(' + (sec * 6) + 'deg)';
  requestAnimationFrame(frame);
}

initWrap();
applyColor(pickColor());
tick();
setInterval(tick, 1000);
requestAnimationFrame(frame);
</script>
</body>
</html>


tick() 안에서 S, V, O, 기호, 색상이 모두 1초마다 동시에 갱신돼요.​​​​​​​​​​​​​​​​
