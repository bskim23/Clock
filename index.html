<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
body {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
}
#wrap {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-transform-origin:center center;
  transform-origin:center center;
}
#time {
  font-family:Courier,monospace;
  font-size:22vw;
  line-height:1;
  white-space:nowrap;
}
#colon {
  -webkit-animation:blink 1s step-end infinite;
  animation:blink 1s step-end infinite;
}
@-webkit-keyframes blink { 50% { opacity:0.1; } }
@keyframes blink         { 50% { opacity:0.1; } }
#date {
  font-family:Courier,monospace;
  font-size:3.5vw;
  margin-top:8px;
  letter-spacing:2px;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="time"><span id="hh">00</span><span id="colon">:</span><span id="mm">00</span></div>
  <div id="date"></div>
</div>
<script>
var DAYS = ['일','월','화','수','목','금','토'];
var COLORS = [
  '#ffffff', '#aaaaaa', '#ff6b6b', '#ff9f43',
  '#ffd32a', '#0be881', '#67e5ad', '#48dbfb',
  '#54a0ff', '#a29bfe', '#fd79a8', '#fab1d3'
];
var lastColorIdx = -1;
var lastMinute = -1;

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function pickColor() {
  var idx;
  do { idx = Math.floor(Math.random() * COLORS.length); }
  while (idx === lastColorIdx);
  lastColorIdx = idx;
  return COLORS[idx];
}

function applyColor(c) {
  document.getElementById('time').style.color = c;
  document.getElementById('date').style.color = c;
}

function tick() {
  var t = new Date();
  var m = t.getMinutes();
  document.getElementById('hh').textContent = pad(t.getHours());
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('date').textContent =
    t.getFullYear() + '년 ' + (t.getMonth() + 1) + '월 ' +
    t.getDate() + '일 (' + DAYS[t.getDay()] + ')';
  if (m !== lastMinute) {
    lastMinute = m;
    applyColor(pickColor());
  }
}

function initWrap() {
  var wrap = document.getElementById('wrap');
  wrap.style.width  = window.innerWidth  + 'px';
  wrap.style.height = window.innerHeight + 'px';
}

function frame() {
  var t = new Date();
  var sec = t.getSeconds() + t.getMilliseconds() / 1000;
  var wrap = document.getElementById('wrap');
  wrap.style.webkitTransform = 'rotate(' + (sec * 6) + 'deg)';
  wrap.style.transform       = 'rotate(' + (sec * 6) + 'deg)';
  requestAnimationFrame(frame);
}

initWrap();
applyColor(pickColor());
tick();
setInterval(tick, 1000);
requestAnimationFrame(frame);
</script>
</body>
</html>
