<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
body {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
}
#wrap {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-transform-origin:center center;
  transform-origin:center center;
}
#time {
  font-family:Courier,monospace;
  font-size:22vw;
  color:#888;
  line-height:1;
  white-space:nowrap;
}
#colon {
  -webkit-animation:blink 1s step-end infinite;
  animation:blink 1s step-end infinite;
}
@-webkit-keyframes blink { 50% { opacity:0.1; } }
@keyframes blink         { 50% { opacity:0.1; } }
#date {
  font-family:Courier,monospace;
  font-size:3.5vw;
  color:#444;
  margin-top:8px;
  letter-spacing:2px;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="time"><span id="hh">00</span><span id="colon">:</span><span id="mm">00</span></div>
  <div id="date"></div>
</div>
<script>
var DAYS = ['일','월','화','수','목','금','토'];
var angle = 0;
var last = 0;

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function tick() {
  var t = new Date();
  document.getElementById('hh').textContent = pad(t.getHours());
  document.getElementById('mm').textContent = pad(t.getMinutes());
  document.getElementById('date').textContent =
    t.getFullYear() + '년 ' + (t.getMonth() + 1) + '월 ' +
    t.getDate() + '일 (' + DAYS[t.getDay()] + ')';
}

function initWrap() {
  var wrap = document.getElementById('wrap');
  wrap.style.width  = window.innerWidth  + 'px';
  wrap.style.height = window.innerHeight + 'px';
}

function frame(now) {
  if (last === 0) last = now;
  var delta = now - last;
  last = now;
  angle += (delta / 1000) * 6;
  var wrap = document.getElementById('wrap');
  if (angle >= 360) {
    angle = 0;
    wrap.style.webkitTransform = 'rotate(0deg)';
    wrap.style.transform = 'rotate(0deg)';
  } else {
    wrap.style.webkitTransform = 'rotate(' + angle + 'deg)';
    wrap.style.transform = 'rotate(' + angle + 'deg)';
  }
  requestAnimationFrame(frame);
}

initWrap();
tick();
setInterval(tick, 1000);
requestAnimationFrame(frame);
</script>
</body>
</html>
